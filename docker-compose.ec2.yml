services:
  postgres:
    image: postgres:16-alpine
    container_name: pulso-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulso_digital
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulso-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulso-backend
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pulso_digital
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production-please-32-chars-minimum
      CORS_ORIGINS: '["http://34.238.159.1:8080","http://34.238.159.1"]'
      LOG_LEVEL: INFO
      ML_ENABLED: false
      AZURE_FOUNDRY_BASE_URL: https://aoai-sophia-xoc-eus2.services.ai.azure.com/openai/v1
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY}
      AZURE_FOUNDRY_MODEL: gpt-5-mini
      CHAT_SESSION_TTL_MINUTES: 60
      CHAT_MEMORY_WINDOW: 10
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api/v1
    container_name: pulso-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: pulso-network
